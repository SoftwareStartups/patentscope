name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env

      - name: Check code formatting
        run: bun run format:check

      - name: Lint code
        run: bun run lint

      - name: Type check
        run: bun run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env

      - name: Run unit tests
        run: bun run test:unit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env

      - name: Build project
        run: bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: build-output
          path: build/
          retention-days: 1
          compression-level: 6

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: build-output
          path: build/

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env

      - name: Run integration tests
        env:
          LOG_LEVEL: error
        run: bun run test:integration
