name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env

      - name: Format check
        run: task format:check

      - name: Lint
        run: task lint

      - name: Typecheck
        run: task typecheck

  unit-tests:
    name: Unit Tests
    needs: lint-and-typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env

      - name: Run unit tests
        run: task test:unit

  build:
    name: Build
    needs: lint-and-typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env

      - name: Build
        run: task build

  integration-tests:
    name: Integration Tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env

      - name: Build
        run: task build

      - name: Run integration tests
        env:
          LOG_LEVEL: error
        run: task test:integration
