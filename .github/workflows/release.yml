name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: bun-linux-x64
            os: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            os: linux
            arch: arm64
          - runner: ubuntu-latest
            target: bun-darwin-x64
            os: darwin
            arch: x64
          - runner: macos-15
            target: bun-darwin-arm64
            os: darwin
            arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Verify CI passed for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Waiting for CI to complete for commit ${{ github.sha }}..."
          for i in $(seq 1 20); do
            RUN_ID=$(gh run list \
              --repo "${{ github.repository }}" \
              --commit "${{ github.sha }}" \
              --workflow "CI" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            if [ -n "$RUN_ID" ]; then
              break
            fi
            echo "CI run not found yet (attempt $i/20). Waiting 15s..."
            sleep 15
          done
          if [ -z "$RUN_ID" ]; then
            echo "No CI run found for commit ${{ github.sha }}. Aborting release."
            exit 1
          fi
          gh run watch "$RUN_ID" --repo "${{ github.repository }}" --exit-status

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env

      - name: Compile binary
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --outfile patentscope-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: patentscope-${{ matrix.os }}-${{ matrix.arch }}
          path: patentscope-${{ matrix.os }}-${{ matrix.arch }}
          retention-days: 1

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} artifacts/* --generate-notes --repo ${{ github.repository }}
