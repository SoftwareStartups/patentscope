name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            os: linux
            arch: x64
          - target: bun-linux-arm64
            os: linux
            arch: arm64
          - target: bun-darwin-x64
            os: darwin
            arch: x64
          - target: bun-darwin-arm64
            os: darwin
            arch: arm64

    steps:
      - name: Verify CI passed for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESULT=$(gh run list \
            --repo "${{ github.repository }}" \
            --commit "${{ github.sha }}" \
            --workflow "CI" \
            --status "success" \
            --limit 1 \
            --json conclusion \
            --jq '.[0].conclusion // "none"')
          if [ "$RESULT" != "success" ]; then
            echo "CI has not passed for commit ${{ github.sha }} (got: $RESULT). Aborting release."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v6.0.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Compile binary
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --outfile google-patents-mcp-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: google-patents-mcp-${{ matrix.os }}-${{ matrix.arch }}
          path: google-patents-mcp-${{ matrix.os }}-${{ matrix.arch }}
          retention-days: 1

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          generate_release_notes: true
          files: artifacts/*
