version: "3"

tasks:
  install:
    desc: Install dependencies
    cmds:
      - bun install

  build:
    desc: Build TypeScript to JavaScript
    cmds:
      - bun run build

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf build/
      - rm -f *.tsbuildinfo

  format:
    desc: Format code with Prettier
    cmds:
      - bun run format

  format:check:
    desc: Check code formatting
    cmds:
      - bun run format:check

  lint:
    desc: Run ESLint
    cmds:
      - bun run lint

  typecheck:
    desc: Run TypeScript type checking
    cmds:
      - bun run typecheck

  check:
    desc: Run ESLint and TypeScript type checking
    deps: [lint, typecheck]

  test:
    desc: Run unit and integration tests (excluding e2e)
    deps: [build]
    cmds:
      - bun run test:unit
      - bun run test:integration

  test:unit:
    desc: Run unit tests only
    deps: [build]
    cmds:
      - bun run test:unit

  test:integration:
    desc: Run integration tests with mocked SerpAPI calls
    deps: [build]
    cmds:
      - bun run test:integration

  test:e2e:
    desc: Run end-to-end tests with real SerpAPI calls
    deps: [build]
    cmds:
      - bun run test:e2e

  test:all:
    desc: Run all tests including end-to-end
    deps: [build]
    cmds:
      - bun run test:all

  ci:
    desc: Run full CI pipeline locally
    cmds:
      - task: clean
      - task: install
      - task: format:check
      - task: check
      - task: build
      - task: test

  all:
    desc: Run full build pipeline
    cmds:
      - task: clean
      - task: install
      - task: build
      - task: check
      - task: test
