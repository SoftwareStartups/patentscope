version: "3"

tasks:
  install:
    desc: Install dependencies
    cmds:
      - bun install

  build:
    desc: Build TypeScript to JavaScript
    cmds:
      - bun run build

  compile:
    desc: Compile binary for current platform
    cmds:
      - mkdir -p dist
      - bun build src/index.ts --compile --outfile dist/patentscope

  compile:all:
    desc: Compile release binaries for all platforms (linux/darwin/windows × x64/arm64)
    cmds:
      - mkdir -p dist
      - bun build src/index.ts --compile --target=bun-linux-x64 --outfile dist/patentscope-linux-x64
      - bun build src/index.ts --compile --target=bun-linux-arm64 --outfile dist/patentscope-linux-arm64
      - bun build src/index.ts --compile --target=bun-darwin-x64 --outfile dist/patentscope-darwin-x64
      - bun build src/index.ts --compile --target=bun-darwin-arm64 --outfile dist/patentscope-darwin-arm64
      - bun build src/index.ts --compile --target=bun-windows-x64 --outfile dist/patentscope-windows-x64.exe
      - bun build src/index.ts --compile --target=bun-windows-arm64 --outfile dist/patentscope-windows-arm64.exe

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf build/ dist/
      - rm -f *.tsbuildinfo

  format:
    desc: Format code with Prettier
    cmds:
      - bun run format

  format:check:
    desc: Check code formatting
    cmds:
      - bun run format:check

  lint:
    desc: Run ESLint
    cmds:
      - bun run lint

  typecheck:
    desc: Run TypeScript type checking
    cmds:
      - bun run typecheck

  check:
    desc: Run ESLint and TypeScript type checking
    deps: [lint, typecheck]

  test:
    desc: Run unit and integration tests (excluding e2e)
    cmds:
      - bun run test:unit
      - task: build
      - bun run test:integration

  test:unit:
    desc: Run unit tests only
    cmds:
      - bun run test:unit

  test:integration:
    desc: Run integration tests with mocked SerpAPI calls
    deps: [build]
    cmds:
      - bun run test:integration

  test:e2e:
    desc: Run end-to-end tests with real SerpAPI calls
    deps: [build]
    cmds:
      - bun run test:e2e

  test:all:
    desc: Run all tests including end-to-end
    deps: [build]
    cmds:
      - bun run test:unit
      - bun run test:integration
      - bun run test:e2e

  ci:
    desc: Run full CI pipeline locally
    cmds:
      - task: clean
      - task: install
      - task: format:check
      - task: check
      - task: build
      - task: test

  all:
    desc: Run full build pipeline
    cmds:
      - task: clean
      - task: install
      - task: build
      - task: check
      - task: test
